name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
        env:
          # Build-time placeholders only. Dynamic routes aren't executed during
          # `next build`, so no real services are contacted; module init just
          # needs these present. Real values are configured in Vercel.
          DATABASE_URL: postgres://user:pass@localhost:5432/db
          NEXT_PUBLIC_FIREBASE_API_KEY: ci
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci
          NEXT_PUBLIC_FIREBASE_APP_ID: ci
