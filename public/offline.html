<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Travelplaning</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1f2330;
        background: #f7f8fa;
        text-align: center;
        padding: 1.5rem;
      }
      .card { max-width: 22rem; }
      .icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #1d4ed8;
        color: #fff;
        font-size: 34px;
        line-height: 64px;
        margin: 0 auto 1rem;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0 0 1.25rem; opacity: 0.75; line-height: 1.5; }
      button {
        font: inherit;
        background: #1d4ed8;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 0.6rem 1.1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">✈</div>
      <h1>Du bist offline</h1>
      <p>
        Diese Seite wurde noch nicht geladen, während du online warst. Bereits
        geöffnete Reisen, Reisepläne und Tickets bleiben offline verfügbar.
      </p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
